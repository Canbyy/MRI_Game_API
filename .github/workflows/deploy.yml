name: Deploy MRI Game API to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore MriGame.Api/MriGame.Api/MriGame.Api.csproj

      - name: Restore test dependencies
        run: dotnet restore MriGame.Api/MriGame.Api.Tests/MriGame.Api.Tests.csproj

      - name: Test
        run: dotnet test MriGame.Api/MriGame.Api.Tests/MriGame.Api.Tests.csproj --no-restore

      - name: Build
        run: dotnet build MriGame.Api/MriGame.Api/MriGame.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish MriGame.Api/MriGame.Api/MriGame.Api.csproj --configuration Release --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mrigame-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
